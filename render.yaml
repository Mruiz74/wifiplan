services:
  # Frontend estático (editor WiFi)
  - type: web
    name: wifiplan
    runtime: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: ./frontend/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  # Backend (auto-diseño + satélite + nube)
  - type: web
    name: wifiplan-api
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm install
    startCommand: node src/server.js
    healthCheckPath: /api/health
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ANTHROPIC_MODEL
        value: claude-opus-4-8
      - key: FRONTEND_URL
        value: https://wifiplan.onrender.com,https://wifi.axionet.io
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: GOOGLE_MAPS_KEY
        sync: false
